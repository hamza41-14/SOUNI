
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>متجر سني - الملابس الرجالية</title>

<style>

/* --- لافتة --- */
#main-banner{
  width:100%;
  overflow:hidden;
  box-shadow:0 3px 12px rgba(6,95,70,.3);
  margin-bottom:10px;
  border-radius:0 0 20px 20px;
}
#main-banner img{
  width:100%;
  height:auto;
  display:block;
  object-fit:cover;
  border-radius:0 0 20px 20px;
}

/* --- هيدر --- */
header{
  background:#065f46;
  color:white;
  padding:10px 15px;
  display:flex;
  align-items:center;
  gap:10px;
  border-radius:0 0 15px 15px;
  box-shadow:0 3px 8px rgb(6 95 70 / .3);
  flex-wrap:wrap;
}
.logo img{
  height:45px;
  border-radius:10px;
  object-fit:contain;
}
.search-bar{
  flex-grow:1;
  display:flex;
}
.search-bar input{
  flex-grow:1;
  padding:8px;
  border-radius:8px 0 0 8px;
  border:none;
  font-size:.95rem;
}
.search-bar button{
  background:#10b981;
  border:none;
  color:white;
  padding:0 12px;
  border-radius:0 8px 8px 0;
  cursor:pointer;
  font-size:1.1rem;
}

/* --- أقسام --- */
nav.categories{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
nav.categories button{
  padding:6px 12px;
  border-radius:12px;
  border:1.5px solid #065f46;
  background:white;
  color:#065f46;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}
nav.categories button.active,
nav.categories button:hover{
  background:#065f46;
  color:white;
}

/* --- منتجات --- */
main#productsContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  padding:0 10px 20px;
  max-width:1200px;
  margin:auto;
}
article.product-card{
  border:1px solid #d1d5db;
  border-radius:12px;
  padding:8px;
  background:white;
  box-shadow:0 2px 6px rgb(0 0 0 / .05);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.3s;
}
article.product-card:hover{
  box-shadow:0 5px 15px rgb(6 95 70 / .2);
}
article.product-card img{
  width:100%;
  height:150px;
  object-fit:contain;
  border-radius:12px;
  margin-bottom:8px;
}
.product-info h3{
  margin:0 0 4px;
  font-size:1rem;
  color:#065f46;
}
.product-info .description{
  font-size:.8rem;
  color:#6b7280;
  margin-bottom:8px;
}
.product-info .price{
  font-weight:700;
  font-size:1rem;
  color:#10b981;
  margin-bottom:8px;
}
.product-info button{
  background:#065f46;
  border:none;
  color:white;
  padding:6px 0;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  width:90%;
  align-self:center;
}

/* --- سلة --- */
aside#cart-sidebar{
  position:fixed;
  top:0;
  right:-360px;
  width:360px;
  height:100vh;
  background:white;
  box-shadow:-5px 0 15px rgb(6 95 70 / .2);
  padding:15px;
  transition:.35s;
  z-index:1100;
  display:flex;
  flex-direction:column;
  border-radius:15px 0 0 15px;
}
aside#cart-sidebar.open{right:0;}

#cartItemsList{
  list-style:none;
  padding:0;
  margin:0;
  flex-grow:1;
  overflow-y:auto;
}
#cartItemsList li{
  display:flex;
  justify-content:space-between;
  padding:6px 4px;
  border-bottom:1px solid #ddd;
  font-size:.95rem;
}
#cart-total{
  font-weight:700;
  font-size:1.1rem;
  text-align:center;
  margin:10px 0;
  color:#065f46;
}
#cart-toggle-btn{
  position:fixed;
  top:15px;
  right:15px;
  background:#10b981;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  color:white;
  font-size:1.5rem;
  cursor:pointer;
  z-index:1200;
}
#send-whatsapp-btn{
  background:#25d366;
  color:white;
  font-weight:700;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
}

footer{
  background:#065f46;
  color:white;
  text-align:center;
  padding:10px;
  font-size:.85rem;
}

</style>
</head>

<body>

<div id="main-banner">
  <img src="banner.jpg" alt="لافتة متجر سني">
</div>

<header>
  <div class="logo">
    <img src="logo.jpg" alt="لوغو سني">
  </div>
  <div class="search-bar">
    <input type="search" id="searchInput" placeholder="ابحث عن منتج..." />
    <button onclick="searchProducts()">🔍</button>
  </div>
</header>

<nav class="categories">
  <button class="active" onclick="filterCategory('all')">الكل</button>
  <button onclick="filterCategory('العطور')">العطور</button>
</nav>

<main id="productsContainer"></main>

<aside id="cart-sidebar">

  <ul id="cartItemsList">
    <li>السلة فارغة</li>
  </ul>
  <p id="cart-total">الإجمالي: 0 أوقية</p>
  <button id="send-whatsapp-btn" onclick="sendOrderWhatsApp()">إرسال الطلب عبر واتساب</button>
</aside>

<button id="cart-toggle-btn">🛒</button>

<footer>

</footer>

const productsContainer=document.getElementById('productsContainer');
const cartSidebar=document.getElementById('cart-sidebar');
const cartToggleBtn=document.getElementById('cart-toggle-btn');
const cartItemsList=document.getElementById('cartItemsList');
const cartTotal=document.getElementById('cart-total');
const searchInput=document.getElementById('searchInput');

let cart=[];

function renderProducts(filter='all'){
  productsContainer.innerHTML='';
  const displayed=filter==='all'?products:products.filter(p=>p.category===filter);
  displayed.forEach(product=>{
    const card=document.createElement('article');
    card.className='product-card';
    card.innerHTML=`
      <img src="${product.img}">
      <div class="product-info">
        <h3>${product.name}</h3>
        <p class="description">${product.description}</p>
        <p class="price">${product.price} أوقية</p>
        <button onclick="addToCart(${product.id})">أضف إلى السلة</button>
      </div>
    `;
    productsContainer.appendChild(card);
  });
}

function addToCart(id){
  const product=products.find(p=>p.id===id);
  cart.push(product);
  updateCart();
}

function updateCart(){
  cartItemsList.innerHTML='';
  if(cart.length===0){
    cartItemsList.innerHTML='<li>السلة فارغة</li>';
    cartTotal.textContent='الإجمالي: 0 أوقية';
    return;
  }
  let total=0;
  cart.forEach((item,index)=>{
    total+=item.price;
    const li=document.createElement('li');
    li.innerHTML=`
      ${item.name} - ${item.price} أوقية
      <button onclick="removeFromCart(${index})">✖</button>
    `;
    cartItemsList.appendChild(li);
  });
  cartTotal.textContent='الإجمالي: '+total+' أوقية';
}

function removeFromCart(index){
  cart.splice(index,1);
  updateCart();
}

function filterCategory(category){
  document.querySelectorAll('nav button').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts(category);
}

function searchProducts(){
  const q=searchInput.value.toLowerCase();
  const filtered=products.filter(p=>p.name.toLowerCase().includes(q));
  productsContainer.innerHTML='';
  filtered.forEach(product=>{
    const card=document.createElement('article');
    card.className='product-card';
    card.innerHTML=`
      <img src="${product.img}">
      <div class="product-info">
        <h3>${product.name}</h3>
        <p class="description">${product.description}</p>
        <p class="price">${product.price} أوقية</p>
        <button onclick="addToCart(${product.id})">أضف إلى السلة</button>
      </div>
    `;
    productsContainer.appendChild(card);
  });
}

cartToggleBtn.addEventListener('click',()=>cartSidebar.classList.toggle('open'));

function sendOrderWhatsApp(){
  if(cart.length===0) return alert('السلة فارغة');
  const phone="22231513331";
  let message="طلب جديد من SUNI:%0A";
  cart.forEach(item=>{
    message+=`${item.name} - ${item.price} أوقية%0A`;
  });
  window.open(`https://wa.me/${phone}?text=${message}`,'_blank');
}

renderProducts();
